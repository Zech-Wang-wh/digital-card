<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Digital Business Card</title>

  <style>
    :root{
      /* Brand */
      --brand:#2d2d39;      /* deep blue */
      --accent:#fee600;     /* yellow (use sparingly) */

      /* UI */
      --bg0:#070810;
      --bg1:#0b0d17;
      --card: rgba(18, 21, 33, .62);
      --card2: rgba(18, 21, 33, .48);
      --stroke: rgba(255,255,255,.12);
      --stroke2: rgba(255,255,255,.18);
      --ink:#ffffff;
      --muted:rgba(255,255,255,.76);
      --muted2:rgba(255,255,255,.56);
      --shadow: 0 20px 70px rgba(0,0,0,.55);
      --shadow2: 0 14px 40px rgba(0,0,0,.35);

      --r-xl: 28px;
      --r-lg: 22px;
      --r-md: 16px;
      --r-sm: 12px;

      --max: 520px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(1100px 700px at 15% -10%, rgba(254,230,0,.08), transparent 55%),
        radial-gradient(900px 600px at 85% 0%, rgba(45,45,57,.55), transparent 58%),
        linear-gradient(180deg, #050612, var(--bg1) 45%, #050612);
      overflow-x:hidden;
    }

    .wrap{ max-width:var(--max); margin:0 auto; padding:16px 14px 28px; }

    .shell{
      position:relative;
      border-radius:var(--r-xl);
      overflow:hidden;
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,.10);
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      min-height: 760px;
      isolation:isolate;
    }

    /* subtle accent rim */
    .shell:before{
      content:"";
      position:absolute; inset:-1px;
      border-radius:inherit;
      padding:1px;
      background:
        linear-gradient(135deg,
          rgba(254,230,0,.40),
          rgba(255,255,255,.10) 28%,
          rgba(45,45,57,.55) 62%,
          rgba(255,255,255,.10));
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events:none;
      opacity:.55;
    }

    /* Hero background image + dark overlay */
    .bg{
      position:absolute; inset:0;
      background:
        radial-gradient(900px 520px at 50% 18%, rgba(255,255,255,.06), rgba(0,0,0,.55) 55%, rgba(0,0,0,.78)),
        linear-gradient(180deg, rgba(45,45,57,.15), rgba(0,0,0,.58) 45%, rgba(0,0,0,.86)),
        url("./EY_logo.jpg");
      background-size:cover;
      background-position:center;
      filter: saturate(1.05) contrast(1.05);
      transform: scale(1.02);
      z-index:-2;
    }

    .inner{ position:relative; padding:18px 16px 18px; }

    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      gap:12px;
    }

    .brand{
      display:flex; align-items:center; gap:12px;
      min-width:0;
    }

    .mark{
      width:40px; height:40px;
      border-radius:14px;
      display:grid; place-items:center;
      background: rgba(18, 21, 33, .55);
      border:1px solid rgba(255,255,255,.18);
      box-shadow: var(--shadow2);
      backdrop-filter: blur(14px);
      font-weight:1000;
      letter-spacing:.6px;
    }

    .brand .txt{
      display:flex; flex-direction:column; line-height:1.08;
      min-width:0;
    }
    .brand .txt b{
      font-size:14px; font-weight:1000;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .brand .txt span{
      font-size:12px;
      color:var(--muted2);
      font-weight:900;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    .actions{ display:flex; align-items:center; gap:10px; }

    .btn-icon{
      width:42px; height:42px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(18, 21, 33, .45);
      backdrop-filter: blur(14px);
      color:#fff;
      display:grid; place-items:center;
      cursor:pointer;
      box-shadow: var(--shadow2);
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }
    .btn-icon:hover{
      transform: translateY(-1px);
      border-color: rgba(254,230,0,.45);
      background: rgba(18, 21, 33, .58);
    }

    .profile{
      margin-top:30px;
      display:flex; flex-direction:column;
      align-items:center;
      text-align:center;
    }

    .avatar-wrap{
      position:relative;
      width:148px; height:148px;
      border-radius:999px;
      overflow:hidden;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.22);
      box-shadow: 0 18px 44px rgba(0,0,0,.50);
    }

    .avatar{
      width:100%; height:100%;
      object-fit:cover;
      display:block;
      transform: scale(1.02);
      filter: contrast(1.04) saturate(1.02);
    }

    .name{
      margin-top:16px;
      font-size:30px;
      font-weight:1000;
      letter-spacing:.5px;
      text-shadow: 0 14px 34px rgba(0,0,0,.55);
    }
    .subtitle{
      margin-top:8px;
      color:var(--muted);
      font-weight:900;
      text-shadow: 0 14px 34px rgba(0,0,0,.55);
    }
    .meta{
      margin-top:10px;
      color:var(--muted2);
      font-weight:900;
      font-size:13px;
      line-height:1.55;
      text-shadow: 0 14px 34px rgba(0,0,0,.55);
      max-width: 30ch;
    }

    .pills{
      margin-top:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .pill{
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(18, 21, 33, .48);
      backdrop-filter: blur(16px);
      color:#fff;
      text-decoration:none;
      box-shadow: 0 14px 34px rgba(0,0,0,.35);
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-weight:1000;
    }
    .pill:hover{
      transform: translateY(-2px);
      border-color: rgba(254,230,0,.45);
      background: rgba(18, 21, 33, .60);
    }

    .pill.primary{
      padding:12px 18px;
      min-width: 190px;
    }

    .ico{
      width:34px; height:34px;
      border-radius:999px;
      display:grid; place-items:center;
      background: rgba(254,230,0,.10);
      border:1px solid rgba(254,230,0,.22);
      color: rgba(254,230,0,.92);
      font-size:16px;
    }

    .glass{
      margin-top:22px;
      border-radius:var(--r-lg);
      border:1px solid rgba(255,255,255,.14);
      background: rgba(18, 21, 33, .50);
      backdrop-filter: blur(18px);
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
      overflow:hidden;
    }

    .glass-inner{ padding:18px 18px 10px; }

    .h2{
      font-size:18px;
      font-weight:1000;
      margin:8px 0 12px;
      letter-spacing:.4px;
    }

    .list{ padding:0 14px 14px; }

    .item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 14px;
      border-radius:18px;
      background: rgba(255,255,255,.06);
      color: #fff;
      text-decoration:none;
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 10px 22px rgba(0,0,0,.22);
      margin-top:12px;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }
    .item:hover{
      transform: translateY(-2px);
      border-color: rgba(254,230,0,.35);
      background: rgba(255,255,255,.08);
    }

    .item-left{ display:flex; align-items:center; gap:12px; font-weight:1000; }

    .appicon{
      width:38px; height:38px;
      border-radius:14px;
      display:grid; place-items:center;
      background: rgba(45,45,57,.65);
      border: 1px solid rgba(255,255,255,.14);
      color: rgba(255,255,255,.92);
      box-shadow: 0 10px 22px rgba(0,0,0,.20);
    }

    .subtext{
      font-size:12px;
      color: rgba(255,255,255,.62);
      font-weight:900;
      margin-top:2px;
      line-height:1.35;
      word-break: break-word;
    }

    .arrow{
      color: rgba(255,255,255,.55);
      font-weight:1000;
      font-size:18px;
    }

    .foot{
      margin-top:12px;
      text-align:center;
      color:var(--muted2);
      font-size:12px;
      font-weight:900;
      line-height:1.55;
      padding: 0 8px;
    }

    /* small niceties */
    @media (max-width: 360px){
      .name{ font-size:28px; }
      .pill.primary{ min-width: 0; width: 100%; }
    }

    /* reduce motion */
    @media (prefers-reduced-motion: reduce){
      .btn-icon, .pill, .item{ transition:none; }
      .pill:hover, .item:hover, .btn-icon:hover{ transform:none; }
    }

    /* ===== PNG icons (统一风格) ===== */
    .icon-img{
      width:20px;
      height:20px;
      object-fit:contain;
      display:block;
    
      /* 让黑色线条 PNG 在深底变成白色 */
      filter: invert(1) brightness(1.05);
      opacity:.95;
    }
    
    .ico .icon-img{ width:18px; height:18px; }
    
    .item:hover .appicon .icon-img{
      /* hover 给一点偏黄的感觉（更像品牌点缀） */
      filter: invert(1) sepia(1) saturate(12) hue-rotate(5deg) brightness(1.05);
    }
    
    .pill:hover .ico .icon-img{
      filter: invert(1) sepia(1) saturate(12) hue-rotate(5deg) brightness(1.05);
    }
  </style>
</head>

<body>

  <script>
    let lang = (navigator.language || '').toLowerCase().startsWith('zh') ? 'zh' : 'en';

    function applyLang(){
      document.querySelectorAll('[data-zh]').forEach(el=>{
        el.textContent = (lang === 'zh') ? el.dataset.zh : el.dataset.en;
      });
      document.documentElement.lang = (lang === 'zh') ? 'zh-Hant' : 'en';
    }

    function toggleLang(){
      lang = (lang === 'zh') ? 'en' : 'zh';
      applyLang();
    }

    applyLang();
  </script>
